<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forge CLI Test Terminal</title>
    <style>
      :root {
        --bg: #050807;
        --panel: #060b09;
        --panel-2: #0b1410;
        --text: #e9fff1;
        --muted: #7ea48a;
        --border: #1b3828;
        --accent: #37ff8b;
        --accent-2: #87f7ff;
        --danger: #ff5f57;
        --warn: #ffbd2e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(rgba(55, 255, 139, 0.025) 1px, transparent 1px),
          radial-gradient(circle at 20% 0%, #0c251c, var(--bg) 44%);
        background-size: 100% 4px, auto;
        color: var(--text);
        font-family: "Consolas", "Menlo", "Courier New", monospace;
        padding: 0;
      }

      .page {
        width: 100%;
        min-height: 100vh;
        padding: 0.9rem;
        display: grid;
      }

      .card {
        width: 100%;
        min-height: calc(100vh - 1.8rem);
        border: 1px solid var(--border);
        border-radius: 6px;
        background: rgba(6, 11, 9, 0.96);
        box-shadow:
          0 0 0 1px rgba(55, 255, 139, 0.08),
          0 22px 80px rgba(0, 0, 0, 0.65);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .header {
        padding: 0.55rem 0.8rem;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        color: #c9f7d5;
        font-size: 0.9rem;
        background: var(--panel-2);
      }

      .terminal-title {
        display: flex;
        align-items: center;
        gap: 0.65rem;
        min-width: 0;
      }

      .terminal-dots {
        display: inline-flex;
        gap: 0.35rem;
        flex: 0 0 auto;
      }

      .terminal-dots span {
        width: 0.72rem;
        height: 0.72rem;
        border-radius: 50%;
        display: block;
      }

      .dot-red {
        background: var(--danger);
      }

      .dot-yellow {
        background: var(--warn);
      }

      .dot-green {
        background: var(--accent);
      }

      .place-row {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        border-bottom: 1px solid var(--border);
        background: #06100c;
      }

      button.place {
        appearance: none;
        border: 0;
        border-right: 1px solid var(--border);
        background: transparent;
        color: #a7d9b6;
        font: inherit;
        padding: 0.55rem 0.5rem;
        text-transform: uppercase;
        font-size: 0.82rem;
      }

      button.place:last-child {
        border-right: 0;
      }

      button.place:hover,
      button.place.active {
        background: rgba(55, 255, 139, 0.12);
        color: var(--text);
        cursor: pointer;
      }

      .terminal {
        flex: 1;
        min-height: 0;
        padding: 0.9rem 1rem 0.65rem;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      #output {
        margin: 0;
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        white-space: pre-wrap;
        line-height: 1.45;
        color: #d6ffe0;
        text-shadow: 0 0 12px rgba(55, 255, 139, 0.1);
      }

      .prompt-row {
        display: grid;
        grid-template-columns: auto 1fr;
        align-items: center;
        border-top: 1px solid var(--border);
        padding-top: 0.55rem;
        margin-top: 0.3rem;
        background: linear-gradient(180deg, transparent, rgba(55, 255, 139, 0.03));
      }

      .prompt {
        color: var(--accent);
        margin-right: 0.5rem;
        font-weight: 700;
      }

      .input-stack {
        min-width: 0;
      }

      #commandInput {
        appearance: none;
        border: 0;
        outline: 0;
        width: 100%;
        padding: 0.55rem 0.4rem;
        background: transparent;
        color: var(--text);
        font: inherit;
        caret-color: var(--accent);
      }

      .autocomplete-hint {
        min-height: 1.15rem;
        color: var(--muted);
        font-size: 0.78rem;
        padding: 0 0.4rem 0.2rem;
      }

      .pill-row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.45rem;
        padding: 0.65rem 0.75rem;
        border-top: 1px solid var(--border);
        background: #06100c;
      }

      button.pill {
        font: inherit;
        color: #c9f7d5;
        background: #08150f;
        border: 1px solid #245338;
        border-radius: 4px;
        padding: 0.28rem 0.7rem;
      }

      button.pill:hover {
        border-color: var(--accent);
        cursor: pointer;
      }

      .muted {
        color: var(--muted);
      }

      a {
        color: var(--accent-2);
      }

      @media (max-width: 760px) {
        body {
          padding: 0;
        }

        .page {
          padding: 0;
        }

        .card {
          min-height: 100vh;
          border-radius: 0;
          border-left: 0;
          border-right: 0;
        }

        .place-row {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .terminal {
          min-height: 0;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="card">
        <div class="header">
          <div class="terminal-title">
            <span class="terminal-dots" aria-hidden="true">
              <span class="dot-red"></span>
              <span class="dot-yellow"></span>
              <span class="dot-green"></span>
            </span>
            <strong>forge-terminal://island-archive</strong>
          </div>
          <span class="muted">main / public</span>
        </div>
        <div class="place-row" aria-label="Main places">
          <button class="place active" type="button" data-place="forge" data-command="go forge">Forge</button>
          <button class="place" type="button" data-place="map" data-command="go map">Map</button>
          <button class="place" type="button" data-place="inventory" data-command="go inventory">Inventory</button>
          <button class="place" type="button" data-place="talents" data-command="go talents">Talents</button>
          <button class="place" type="button" data-place="market" data-command="go market">Market</button>
        </div>
        <div class="terminal">
          <pre id="output" aria-live="polite"></pre>
          <form id="commandForm" class="prompt-row" autocomplete="off">
            <span id="promptLabel" class="prompt">forge&gt;</span>
            <div class="input-stack">
              <input
                id="commandInput"
                list="commandSuggestions"
                autocomplete="off"
                autocorrect="off"
                autocapitalize="off"
                spellcheck="false"
                placeholder="Type a command, e.g. help"
              />
              <datalist id="commandSuggestions"></datalist>
              <div id="autocompleteHint" class="autocomplete-hint">Tab completes commands. Try: go forge</div>
            </div>
          </form>
        </div>
        <div id="quickCommands" class="pill-row">
          <button class="pill" type="button" data-command="help">help</button>
          <button class="pill" type="button" data-command="map">map</button>
          <button class="pill" type="button" data-command="forage">forage</button>
          <button class="pill" type="button" data-command="inventory">inventory</button>
          <button class="pill" type="button" data-command="blueprints">blueprints</button>
          <button class="pill" type="button" data-command="status">status</button>
          <button class="pill" type="button" data-command="seed">seed</button>
          <button class="pill" type="button" data-command="clear">clear</button>
        </div>
      </section>
    </main>

    <script>
      const output = document.getElementById('output');
      const form = document.getElementById('commandForm');
      const input = document.getElementById('commandInput');
      const promptLabel = document.getElementById('promptLabel');
      const hint = document.getElementById('autocompleteHint');
      const suggestionList = document.getElementById('commandSuggestions');
      const quickCommands = document.getElementById('quickCommands');
      const placeButtons = Array.from(document.querySelectorAll('button.place'));

      const state = {
        page: 'forge',
        location: 'Bermuda Abyss',
        day: 1,
        shells: 30,
        materials: {
          "Aether Iron": 2,
          "Moonstone Dust": 1,
          "Ghost Reed": 5,
        },
        cosmetics: {
          "Moon-Tide Cloth": 1,
        },
        forges: [],
        talents: new Set(),
        role: 'Controller',
        forgeName: 'Default Forge',
        player: 'Guest Smith',
      };

      const places = {
        forge: {
          title: 'Forge',
          quick: ['blueprints', 'forge steel_broad_sword', 'optimize', 'inventory', 'go inventory'],
          next: 'Use `blueprints`, then `forge steel_broad_sword`, then `optimize`.'
        },
        map: {
          title: 'Map',
          quick: ['map', 'travel 2', 'travel Bermuda Abyss', 'go inventory', 'status'],
          next: 'Use `map`, then `travel 2` or `travel Atlantean Deep`.'
        },
        inventory: {
          title: 'Inventory',
          quick: ['inventory', 'forage', 'forage 3', 'go forge', 'go market'],
          next: 'Use `forage` to gather, then `go forge` to craft or `go market` to trade.'
        },
        talents: {
          title: 'Talents',
          quick: ['talents', 'roles', 'status', 'go forge', 'go inventory'],
          next: 'Use `talents` to review growth tags, then return with `go forge`.'
        },
        market: {
          title: 'Market',
          quick: ['market', 'inventory', 'go inventory', 'go forge', 'status'],
          next: 'Use `market` to view offers. Trading hooks are light placeholders for now.'
        }
      };

      const locations = [
        'Bermuda Abyss',
        'Atlantean Deep',
        'Oakvault Cay',
        'Poveglia Mire',
        'Hashima Iron Reef',
      ];

      const blueprints = {
        weapon: ['steel_broad_sword', 'war_hammer', 'arc_lance'],
        tool: ['mithril_tinker_kit', 'precision_plow'],
        wearable: ['dragonhide_armor', 'arcane_mantle'],
        misc: ['forgehammer_maintenance_pick', 'aether_runner'],
      };

      const history = [];
      let historyIndex = -1;
      let completionMatches = [];
      let completionIndex = -1;

      function line(text = '') {
        output.textContent += `${text}\n`;
        output.scrollTop = output.scrollHeight;
      }

      function nextStep(text) {
        line(`Next: ${text}`);
        line('');
      }

      function allBlueprintKeys() {
        return Object.values(blueprints).flat();
      }

      function commandCatalog() {
        const base = [
          'help',
          'clear',
          'seed',
          'status',
          'nav',
          'places',
          'map',
          'market',
          'go forge',
          'go map',
          'go inventory',
          'go talents',
          'go market',
          'travel 1',
          'travel 2',
          'travel 3',
          'travel 4',
          'travel 5',
          'forage',
          'forage 3',
          'inventory',
          'blueprints',
          'talents',
          'roles',
          'optimize',
          'benchmark',
        ];
        const travelCommands = locations.map((loc) => `travel ${loc}`);
        const forgeCommands = allBlueprintKeys().map((key) => `forge ${key}`);
        return [...base, ...travelCommands, ...forgeCommands].sort();
      }

      function updateAutocompleteList() {
        suggestionList.innerHTML = '';
        commandCatalog().forEach((command) => {
          const option = document.createElement('option');
          option.value = command;
          suggestionList.appendChild(option);
        });
      }

      function updateHint() {
        const raw = input.value.trim().toLowerCase();
        if (!raw) {
          hint.textContent = `Tab completes commands. Next: ${places[state.page].next}`;
          return;
        }
        const matches = commandCatalog().filter((command) => command.toLowerCase().startsWith(raw));
        if (!matches.length) {
          hint.textContent = 'No completion found. Type `help` or `nav`.';
          return;
        }
        hint.textContent = matches.length === 1
          ? `Tab: ${matches[0]}`
          : `Tab cycles ${matches.length} matches: ${matches.slice(0, 4).join(' | ')}`;
      }

      function completeInput() {
        const raw = input.value.trim().toLowerCase();
        if (!raw) {
          input.value = places[state.page].quick[0];
          updateHint();
          return;
        }
        const matches = commandCatalog().filter((command) => command.toLowerCase().startsWith(raw));
        if (!matches.length) {
          updateHint();
          return;
        }
        if (matches.join('\n') !== completionMatches.join('\n')) {
          completionMatches = matches;
          completionIndex = 0;
        } else {
          completionIndex = (completionIndex + 1) % completionMatches.length;
        }
        input.value = completionMatches[completionIndex];
        updateHint();
      }

      function bindCommandButtons() {
        Array.from(document.querySelectorAll('[data-command]')).forEach((button) => {
          button.onclick = () => {
            const command = button.dataset.command;
            input.value = command;
            input.focus();
            form.dispatchEvent(new Event('submit', { cancelable: true, bubbles: true }));
          };
        });
      }

      function setPage(nextPage, silent = false) {
        if (!places[nextPage]) {
          line(`Unknown place: ${nextPage}`);
          nextStep('Use `nav` to see places, or `go forge`, `go inventory`, `go talents`, `go market`.');
          return;
        }
        state.page = nextPage;
        promptLabel.textContent = `${nextPage}>`;
        placeButtons.forEach((button) => {
          button.classList.toggle('active', button.dataset.place === nextPage);
        });
        quickCommands.innerHTML = '';
        places[nextPage].quick.forEach((command) => {
          const button = document.createElement('button');
          button.className = 'pill';
          button.type = 'button';
          button.dataset.command = command;
          button.textContent = command;
          quickCommands.appendChild(button);
        });
        bindCommandButtons();
        updateHint();
        if (!silent) {
          line(`Moved to ${places[nextPage].title}.`);
          nextStep(places[nextPage].next);
        }
      }

      function banner() {
        line('FORGE TERMINAL v0.2');
        line('Connected to island-archive://bermuda-abyss');
        line('Main places mounted: /forge /map /inventory /talents /market');
        line('Type `nav` to move quickly. Press Tab for autocomplete.');
        line('');
        nextStep('Start with `go forge`, `blueprints`, or click a place button above.');
      }

      function commandHelp() {
        line('Available commands:');
        line('  help                     show this help screen');
        line('  clear                    clear terminal output');
        line('  seed                     load starter inventory and stats');
        line('  status                   show player/location snapshot');
        line('  nav                      show main places and navigation tips');
        line('  go <place>               jump to forge, map, inventory, talents, or market');
        line('  map                      show island locations');
        line('  travel <location>        move to an island (name or index 1-5)');
        line('  forage                   add random materials from current location');
        line('  forage <attempts>        gather multiple times from current location');
        line('  inventory                list materials/cosmetics/inventory');
        line('  market                   show marketplace placeholder offers');
        line('  blueprints               list sample forge blueprints');
        line('  forge <blueprint>        craft a sample artifact');
        line('  talents                  list active talent tags');
        line('  roles                    list valid optimization roles');
        line('  optimize                 show role score summary for current gear');
        line('  benchmark                show sample leaderboard snapshot');
        line('  Tab                      autocomplete the current command');
        line('');
        nextStep(places[state.page].next);
      }

      function resetSeed() {
        state.page = 'forge';
        state.location = 'Bermuda Abyss';
        state.day = 1;
        state.shells = 30;
        state.materials = {
          "Aether Iron": 2,
          "Moonstone Dust": 1,
          "Ghost Reed": 5,
        };
        state.cosmetics = {
          "Moon-Tide Cloth": 1,
        };
        state.forges = [];
        state.talents.clear();
        setPage('forge', true);
        line('Seed applied. Baseline profile loaded.');
        nextStep('Use `blueprints` to choose a forge plan, or `go inventory` and `forage` for more materials.');
      }

      function showStatus() {
        line(`Player: ${state.player}`);
        line(`Forge: ${state.forgeName}`);
        line(`Role: ${state.role}`);
        line(`Place: ${places[state.page].title}`);
        line(`Day: ${state.day}`);
        line(`Location: ${state.location}`);
        line(`Shells: ${state.shells}`);
        nextStep(places[state.page].next);
      }

      function showNav() {
        line('Main places:');
        Object.entries(places).forEach(([key, place]) => {
          const marker = key === state.page ? '*' : ' ';
          line(` ${marker} ${key.padEnd(10)} ${place.next}`);
        });
        line('');
        line('Examples:');
        line('  go forge');
        line('  go inventory');
        line('  go market');
        nextStep('Click a place button above, or type `go forge` / `go inventory`.');
      }

      function listMap() {
        setPage('map', true);
        line('Known locations:');
        locations.forEach((loc, index) => {
          const marker = loc === state.location ? ' *' : '  ';
          line(` ${index + 1}. ${marker} ${loc}`);
        });
        nextStep('Use `travel 2` for Atlantean Deep, then `go inventory` and `forage`.');
      }

      function showInventory() {
        setPage('inventory', true);
        line('Materials:');
        const materials = Object.entries(state.materials);
        if (!materials.length) {
          line('  (none)');
        } else {
          materials.forEach(([name, qty]) => line(`  ${name}: ${qty}`));
        }

        line('');
        line('Cosmetics:');
        const cosmetics = Object.entries(state.cosmetics);
        if (!cosmetics.length) {
          line('  (none)');
        } else {
          cosmetics.forEach(([name, qty]) => line(`  ${name}: ${qty}`));
        }

        line('');
        line(`Forged assets this session: ${state.forges.length}`);
        nextStep('Use `forage` to collect more, `go forge` to craft, or `go market` to trade.');
      }

      function randomFrom(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      function forage(args = []) {
        setPage('inventory', true);
        const attempts = Math.max(1, Math.min(5, Number(args[0]) || 1));
        const gain = {
          'Bermuda Abyss': ['Aether Iron', 'Salt Pearl'],
          'Atlantean Deep': ['Ghost Reed', 'Siren Thread'],
          'Oakvault Cay': ['Moonstone Dust', 'Verdant Bark'],
          'Poveglia Mire': ['Toxic Clay', 'Bog Crystal'],
          'Hashima Iron Reef': ['Iron Scale', 'Aether Iron'],
        }[state.location] || ['Mystery Shards'];

        line(`Forage completed at ${state.location}.`);
        for (let run = 0; run < attempts; run += 1) {
          const picked = gain[randomFrom(0, gain.length - 1)];
          const amt = randomFrom(1, 3);
          state.materials[picked] = (state.materials[picked] || 0) + amt;
          state.day += 1;
          line(` +${amt} ${picked}`);
        }
        nextStep('Use `inventory` to review your haul, then `go forge` to craft.');
      }

      function travel(rawArgs) {
        setPage('map', true);
        if (!rawArgs.length) {
          line('Usage: travel <location or index>');
          nextStep('Use `map` to view location numbers, then `travel 2`.');
          return;
        }

        const targetRaw = rawArgs.join(' ');
        let target = locations.find((loc) => loc.toLowerCase() === targetRaw.toLowerCase());

        if (!target && /^\d+$/.test(targetRaw)) {
          const idx = Number(targetRaw);
          if (idx >= 1 && idx <= locations.length) {
            target = locations[idx - 1];
          }
        }

        if (!target) {
          line('Unknown location. Use `map` to view available stops.');
          return;
        }

        if (target === state.location) {
          line(`Already at ${state.location}.`);
          return;
        }

        state.location = target;
        line(`Travel complete. You are now at ${state.location}.`);
        nextStep('Use `forage` at this island, or `map` to pick another route.');
      }

      function listBlueprints() {
        setPage('forge', true);
        line('Blueprint catalog:');
        Object.entries(blueprints).forEach(([category, items]) => {
          line(` ${category}`);
          items.forEach((item) => line(`   - ${item}`));
        });
        nextStep('Type `forge steel_broad_sword` or press Tab after typing `forge ` to complete a blueprint.');
      }

      function forge(args) {
        setPage('forge', true);
        if (!args.length) {
          line('Usage: forge <blueprint_key>');
          nextStep('Use `blueprints` to list options, then `forge steel_broad_sword`.');
          return;
        }
        const key = args[0];
        const allBlueprints = Object.values(blueprints).flat();
        if (!allBlueprints.includes(key)) {
          line(`Unknown blueprint: ${key}`);
          nextStep('Use `blueprints` to see exact blueprint keys.');
          return;
        }
        const id = `AST-${String(state.forges.length + 1).padStart(3, '0')}-FORGED`;
        state.forges.push({ id, key, location: state.location, day: state.day });
        line(`Forged ${id} from ${key}.`);
        nextStep('Use `optimize` to score your gear, or `inventory` to review materials.');
      }

      function optimize() {
        const score = Math.max(10, 55 + state.day * 3 + state.forges.length * 7 + Object.keys(state.materials).length * 4);
        line(`Optimization profile: ${state.role}`);
        line(`Current session score: ${score}`);
        line('  - Stat confidence: High');
        line('  - Enchantment density: Moderate');
        line('  - Build coherence: Good');
        nextStep('Use `benchmark` to compare, or `go inventory` and `forage` for more resources.');
      }

      function benchmark() {
        line('Benchmark snapshot:');
        const top = [
          { id: 'AST-001-FORGED', score: 86 },
          { id: 'AST-002-FORGED', score: 74 },
          { id: 'AST-003-FORGED', score: 69 },
        ];
        top.forEach((entry, idx) => line(` ${idx + 1}. ${entry.id}: ${entry.score}`));
        nextStep('Use `forge <blueprint>` to create another item and improve the leaderboard.');
      }

      function roles() {
        line('Optimization roles: DPS, Tank, Support, Controller, Balanced.');
        nextStep('Use `optimize` to score your current gear under the active role.');
      }

      function talents() {
        setPage('talents', true);
        if (!state.talents.size) {
          line('No active talent tags yet. Unlock through gameplay nodes later.');
          nextStep('Return with `go forge`, or explore future growth with `roles`.');
          return;
        }
        line(`Talents (${state.talents.size}): ${Array.from(state.talents).join(', ')}`);
        nextStep('Use `go forge` after planning your build.');
      }

      function market() {
        setPage('market', true);
        line('Marketplace board:');
        line(`  Shells: ${state.shells}`);
        line('  black_salt x3      6 shells');
        line('  moon_shroud_mask   15 shells');
        line('  ancient_gel x4     11 shells');
        line('');
        line('Trading is a placeholder in this web terminal. Full buy/sell hooks come later.');
        nextStep('Use `go inventory` to review goods, or `go forge` to spend materials.');
      }

      function unknown(cmd) {
        line(`Unknown command: ${cmd}`);
        nextStep('Try `help`, `nav`, or press Tab to autocomplete.');
      }

      function execute(raw) {
        const trimmed = raw.trim();
        line(`${state.page}> ${trimmed}`);

        if (!trimmed) {
          return;
        }

        const parts = trimmed.split(/\s+/);
        const cmd = parts[0].toLowerCase();
        const args = parts.slice(1);

        switch (cmd) {
          case 'help':
            commandHelp();
            break;
          case 'clear':
            output.textContent = '';
            banner();
            break;
          case 'seed':
            resetSeed();
            break;
          case 'status':
            showStatus();
            break;
          case 'nav':
          case 'places':
            showNav();
            break;
          case 'go':
            setPage((args[0] || '').toLowerCase());
            break;
          case 'map':
            listMap();
            break;
          case 'travel':
            travel(args);
            break;
          case 'forage':
            forage(args);
            break;
          case 'inventory':
            showInventory();
            break;
          case 'market':
            market();
            break;
          case 'blueprints':
            listBlueprints();
            break;
          case 'forge':
            forge(args);
            break;
          case 'optimize':
            optimize();
            break;
          case 'benchmark':
            benchmark();
            break;
          case 'roles':
            roles();
            break;
          case 'talents':
            talents();
            break;
          default:
            unknown(cmd);
        }
      }

      form.addEventListener('submit', (event) => {
        event.preventDefault();
        const raw = input.value;
        input.value = '';

        if (!raw.trim()) {
          return;
        }

        history.unshift(raw);
        historyIndex = -1;

        execute(raw);
      });

      input.addEventListener('keydown', (event) => {
        if (event.key === 'Tab') {
          event.preventDefault();
          completeInput();
          return;
        }

        if (event.key === 'ArrowUp') {
          event.preventDefault();
          if (!history.length) {
            return;
          }
          if (historyIndex + 1 < history.length) {
            historyIndex += 1;
          }
          input.value = history[historyIndex] || '';
          return;
        }

        if (event.key === 'ArrowDown') {
          event.preventDefault();
          if (historyIndex > -1) {
            historyIndex -= 1;
          }
          input.value = historyIndex >= 0 ? history[historyIndex] : '';
        }
      });

      input.addEventListener('input', () => {
        completionMatches = [];
        completionIndex = -1;
        updateHint();
      });

      updateAutocompleteList();
      setPage('forge', true);
      bindCommandButtons();
      banner();
      commandHelp();
    </script>
  </body>
</html>
